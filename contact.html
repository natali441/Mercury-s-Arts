<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercury's Arts | Contact</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .contact-section { padding: 80px 8%; text-align: center; max-width: 600px; margin: 0 auto; }
        .contact-form { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .contact-form input, .contact-form textarea { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .contact-form button { padding: 12px; background-color: #e4df1b; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .contact-form button:hover { background-color: #c8c417; }
    </style>
</head>
<body>

    <header>
        <a href="./index.html" class="logo-link">
            <img src="./img/LOGO-merc.png" alt="Mercury's Arts Logo" class="site-logo">
            <span class="logo-text">Mercury's <span class="logo-highlight">Arts</span></span>
        </a>
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="site-nav" id="site-nav">
            <a href="./index.html">Home</a>
            <a href="./shop.html">Shop</a>
            <a href="./about.html">About</a>
            <a href="./contact.html" class="active">Contact</a>
        </nav>
        <div class="nav-icons">
            <div class="cart-icon" id="cart-btn">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <section class="contact-section">
        <h2>Contact Us</h2>
        <p>Have questions about custom orders or sizes? Send us a message!</p>
        <form class="contact-form" onsubmit="event.preventDefault(); alert('Message sent!');">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" rows="5" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>

    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <i class="fas fa-times" id="close-cart"></i>
        </div>
        <div class="cart-items" id="cart-items-container">
            <p class="empty-msg">Your cart is currently empty.</p>
        </div>
        <div class="cart-footer">
            <div class="total-price">Total: <span id="cart-total">0.00 ₾</span></div>
            <button class="checkout-btn">Proceed to Checkout</button>
        </div>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <footer>
        <p>&copy; 2026 Mercury's Arts Bracelets. All Rights Reserved. Follow us on Instagram: <a href="https://www.instagram.com/mercurys__arts/" target="_blank" rel="noopener">instagram.com/mercurys__arts/</a>.</p>
    </footer>

    <script src="./main.js"></script>
</body>
</html>
